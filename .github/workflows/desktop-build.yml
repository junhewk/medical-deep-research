name: Desktop Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_triple: x86_64-pc-windows-msvc
            bun_suffix: windows-x64
            bun_ext: .exe
            bundle_type: nsis
            artifact_glob: 'src-tauri/target/release/bundle/nsis/*.exe'
          - os: macos-latest
            target_triple: aarch64-apple-darwin
            bun_suffix: darwin-aarch64
            bun_ext: ''
            bundle_type: dmg
            artifact_glob: 'src-tauri/target/release/bundle/dmg/*.dmg'
          - os: macos-13
            target_triple: x86_64-apple-darwin
            bun_suffix: darwin-x64
            bun_ext: ''
            bundle_type: dmg
            artifact_glob: 'src-tauri/target/release/bundle/dmg/*.dmg'

    runs-on: ${{ matrix.os }}
    env:
      BUN_VERSION: '1.3.11'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install unzip

      # Step 1: Download Bun sidecar binary
      - name: Download Bun sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          BUN_URL="https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-${{ matrix.bun_suffix }}.zip"
          echo "Downloading Bun from: $BUN_URL"
          curl -fsSL "$BUN_URL" -o /tmp/bun.zip
          unzip -q /tmp/bun.zip -d /tmp/bun-extract

          if [ "${{ matrix.bun_ext }}" = ".exe" ]; then
            cp /tmp/bun-extract/bun-*/bun.exe "src-tauri/binaries/bun-${{ matrix.target_triple }}.exe"
          else
            cp /tmp/bun-extract/bun-*/bun "src-tauri/binaries/bun-${{ matrix.target_triple }}"
            chmod +x "src-tauri/binaries/bun-${{ matrix.target_triple }}"
          fi

      # Step 2: Build Next.js standalone
      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build Next.js
        working-directory: web
        run: npm run build

      # Step 3: Copy standalone output to Tauri resources
      - name: Prepare standalone resources
        shell: bash
        run: |
          rm -rf src-tauri/resources/standalone
          cp -r web/.next/standalone src-tauri/resources/standalone

          mkdir -p src-tauri/resources/standalone/.next/static
          cp -r web/.next/static/* src-tauri/resources/standalone/.next/static/

          if [ -d web/public ]; then
            cp -r web/public src-tauri/resources/standalone/public
          fi

          echo "Standalone size: $(du -sh src-tauri/resources/standalone | cut -f1)"

      # Step 4: Install Tauri CLI and build
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri app
        run: cargo tauri build --bundles ${{ matrix.bundle_type }}

      # Step 5: Upload artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target_triple }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('manual-{0}', github.run_number) }}
          name: ${{ github.ref_name || format('Build #{0}', github.run_number) }}
          draft: true
          files: artifacts/**/*
          generate_release_notes: true
