name: Python Desktop Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            artifact_name: Medical-Deep-Research-macOS
          - os: windows-latest
            platform: windows
            artifact_name: Medical-Deep-Research-Windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync --extra openai --extra codex --extra anthropic --extra pdf --extra langchain --extra google
          uv pip install pyinstaller

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(uv run python -c "
          import tomllib, pathlib
          p = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(p['project']['version'])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF" == refs/tags/v* && "${GITHUB_REF_NAME#v}" != "$VERSION" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match project version $VERSION" >&2
            exit 1
          fi

      # --- macOS Build ---
      - name: Import Apple Developer ID certificate
        if: matrix.platform == 'macos'
        shell: bash
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          if [[ -z "${APPLE_DEVELOPER_ID_CERTIFICATE_BASE64}" || -z "${APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD}" ]]; then
            echo "::error::Missing APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 or APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD secret."
            exit 1
          fi

          CERTIFICATE_PATH="${RUNNER_TEMP}/developer-id.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          if ! printf '%s' "${APPLE_DEVELOPER_ID_CERTIFICATE_BASE64}" | base64 --decode > "${CERTIFICATE_PATH}" 2>/dev/null; then
            printf '%s' "${APPLE_DEVELOPER_ID_CERTIFICATE_BASE64}" | base64 -D > "${CERTIFICATE_PATH}"
          fi

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

      - name: Build signed and notarized macOS DMG
        if: matrix.platform == 'macos'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          BUNDLE_ID: ${{ vars.MACOS_BUNDLE_ID }}
          CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: |
          for name in APPLE_ID APPLE_TEAM_ID APPLE_APP_PASSWORD CODESIGN_IDENTITY; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing ${name} secret for macOS signing/notarization."
              exit 1
            fi
          done
          ./scripts/build-macos.sh --dmg --notarize

      - name: Create macOS updater archive
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          UPDATE_NAME="Medical-Deep-Research-${{ steps.version.outputs.version }}-macOS-update.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Medical Deep Research.app" "dist/${UPDATE_NAME}"

      - name: Upload macOS artifact
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.dmg
            dist/*-macOS-update.zip
          if-no-files-found: error

      # --- Windows Build ---
      - name: Build Windows app
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          # Icon is pre-built in assets/icon.ico (committed)
          # The .spec file is cross-platform (same Qt module stripping).
          uv run python -m PyInstaller --noconfirm --clean "Medical Deep Research.spec"

      - name: Package Windows build
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          cd dist
          7z a -tzip "Medical-Deep-Research-${{ steps.version.outputs.version }}-Windows.zip" "Medical Deep Research"

      - name: Upload Windows artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum Medical-Deep-Research-* > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('manual-{0}', github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('Build No.{0}', github.run_number) }}
          draft: false
          files: artifacts/**/*
          generate_release_notes: true
