name: Python Desktop Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Read and validate version
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF" == refs/tags/v* && "${GITHUB_REF_NAME#v}" != "$VERSION" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match project version $VERSION" >&2
            exit 1
          fi

  build:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            artifact_name: Medical-Deep-Research-macOS
          - os: windows-latest
            platform: windows
            artifact_name: Medical-Deep-Research-Windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync --extra openai --extra anthropic --extra pdf --extra langchain --extra google
          uv pip install pyinstaller

      # --- macOS Build ---
      - name: Build macOS app
        if: matrix.platform == 'macos'
        run: |
          # Icons are pre-built in assets/icon.icns (committed)
          # Run PyInstaller (spec file handles Qt module stripping)
          uv run python -m PyInstaller --noconfirm --clean "Medical Deep Research.spec"

          # Ad-hoc sign the bundle so macOS does not treat nested unsigned
          # PyInstaller binaries as a damaged app. Full notarization requires
          # Developer ID credentials, but this fixes broken internal signatures.
          codesign --force --deep --sign - "dist/Medical Deep Research.app"
          codesign --verify --deep --strict --verbose=2 "dist/Medical Deep Research.app"

          echo "App bundle size: $(du -sh 'dist/Medical Deep Research.app' | cut -f1)"

      - name: Create macOS DMG
        if: matrix.platform == 'macos'
        run: |
          UPDATE_NAME="Medical-Deep-Research-${{ needs.metadata.outputs.version }}-macOS-update.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Medical Deep Research.app" "dist/${UPDATE_NAME}"
          DMG_NAME="Medical-Deep-Research-${{ needs.metadata.outputs.version }}-macOS.dmg"
          hdiutil create -volname "Medical Deep Research" \
            -srcfolder "dist/Medical Deep Research.app" \
            -ov -format UDZO \
            "dist/${DMG_NAME}"
          codesign --force --sign - "dist/${DMG_NAME}"
          codesign --verify --verbose=2 "dist/${DMG_NAME}"

      - name: Upload macOS artifact
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.dmg
            dist/*-macOS-update.zip
          if-no-files-found: error

      # --- Windows Build ---
      - name: Build Windows app
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          # Icon is pre-built in assets/icon.ico (committed)
          # The .spec file is cross-platform (same Qt module stripping).
          uv run python -m PyInstaller --noconfirm --clean "Medical Deep Research.spec"

      - name: Package Windows build
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          cd dist
          7z a -tzip "Medical-Deep-Research-${{ needs.metadata.outputs.version }}-Windows.zip" "Medical Deep Research"

      - name: Upload Windows artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
    needs: [metadata, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum Medical-Deep-Research-* > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.metadata.outputs.version }}
          name: "v${{ needs.metadata.outputs.version }}"
          draft: false
          files: artifacts/**/*
          generate_release_notes: true
