name: Python Desktop Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            artifact_name: Medical-Deep-Research-macOS
          - os: windows-latest
            platform: windows
            artifact_name: Medical-Deep-Research-Windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync --extra desktop --extra openai --extra anthropic --extra pdf --extra langchain --extra google
          uv pip install pyinstaller pywebview

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(uv run python -c "
          import tomllib, pathlib
          p = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(p['project']['version'])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # --- macOS Build ---
      - name: Build macOS app
        if: matrix.platform == 'macos'
        run: |
          # Icons are pre-built in assets/icon.icns (committed)
          # Run PyInstaller
          uv run python -m PyInstaller --noconfirm --clean "Medical Deep Research.spec"

          # Strip unused NiceGUI element JS bundles
          for elem in plotly echart mermaid codemirror json_editor aggrid scene leaflet xterm joystick anywidget; do
            for base in \
              "dist/Medical Deep Research.app/Contents/Resources" \
              "dist/Medical Deep Research.app/Contents/Resources/runtime"; do
              rm -rf "${base}/nicegui/elements/${elem}/dist"
              rm -rf "${base}/nicegui/elements/${elem}/src"
            done
          done

          # Ad-hoc sign the bundle so macOS does not treat nested unsigned
          # PyInstaller binaries as a damaged app. Full notarization requires
          # Developer ID credentials, but this fixes broken internal signatures.
          codesign --force --deep --sign - "dist/Medical Deep Research.app"
          codesign --verify --deep --strict --verbose=2 "dist/Medical Deep Research.app"

          echo "App bundle size: $(du -sh 'dist/Medical Deep Research.app' | cut -f1)"

      - name: Create macOS DMG
        if: matrix.platform == 'macos'
        run: |
          DMG_NAME="Medical-Deep-Research-${{ steps.version.outputs.version }}-macOS.dmg"
          hdiutil create -volname "Medical Deep Research" \
            -srcfolder "dist/Medical Deep Research.app" \
            -ov -format UDZO \
            "dist/${DMG_NAME}"
          codesign --force --sign - "dist/${DMG_NAME}"
          codesign --verify --verbose=2 "dist/${DMG_NAME}"

      - name: Upload macOS artifact
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.dmg
          if-no-files-found: error

      # --- Windows Build ---
      - name: Build Windows app
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          # Icon is pre-built in assets/icon.ico (committed)
          # Run PyInstaller
          uv run python -m PyInstaller \
            --noconfirm --clean \
            --name "Medical Deep Research" \
            --windowed \
            --onedir \
            --contents-directory runtime \
            --icon assets/icon.ico \
            --add-data "src/medical_deep_research:medical_deep_research" \
            --collect-all nicegui \
            --collect-all claude_agent_sdk \
            --collect-submodules medical_deep_research \
            --hidden-import medical_deep_research \
            --hidden-import medical_deep_research.main \
            --hidden-import medical_deep_research.ui \
            --hidden-import medical_deep_research.config \
            --hidden-import medical_deep_research.models \
            --hidden-import medical_deep_research.persistence \
            --hidden-import medical_deep_research.service \
            --hidden-import medical_deep_research.runtime \
            --hidden-import medical_deep_research.agentic_tools \
            --hidden-import medical_deep_research.tools \
            --hidden-import claude_agent_sdk \
            --hidden-import claude_agent_sdk.types \
            --hidden-import pydantic_settings \
            --hidden-import sqlmodel \
            --hidden-import nicegui \
            --hidden-import httpx \
            --hidden-import anyio \
            scripts/desktop_entry.py

          # Strip unused NiceGUI element JS bundles
          for elem in plotly echart mermaid codemirror json_editor aggrid scene leaflet xterm joystick anywidget; do
            for base in \
              "dist/Medical Deep Research" \
              "dist/Medical Deep Research/runtime"; do
              rm -rf "${base}/nicegui/elements/${elem}/dist"
              rm -rf "${base}/nicegui/elements/${elem}/src"
            done
          done

      - name: Package Windows build
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          cd dist
          7z a -tzip "Medical-Deep-Research-${{ steps.version.outputs.version }}-Windows.zip" "Medical Deep Research"

      - name: Upload Windows artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('manual-{0}', github.run_number) }}
          name: "${{ github.ref_name || format('Build No.{0}', github.run_number) }}"
          draft: true
          files: artifacts/**/*
          generate_release_notes: true
